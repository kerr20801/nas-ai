# Pipeline 2: NAS AI analysis events
#
# Input:  HTTP POST JSON — NAS AI service calls this after every upload
# Output: Elasticsearch nas-ai-events-YYYY.MM.dd
#
# NAS AI posts to http://logstash-host:5044 with Content-Type: application/json
# The payload already matches the schema defined in the ES template.

input {
  http {
    port  => 5044
    type  => "nas-ai-events"
    codec => "json"
  }
}

filter {
  if [type] == "nas-ai-events" {

    # ── Step 1: @timestamp — use event time if provided, else now ─────────────
    if [timestamp] {
      date {
        match  => ["timestamp", "ISO8601"]
        target => "@timestamp"
      }
      mutate { remove_field => ["timestamp"] }
    }

    # ── Step 2: Type coercion (NAS AI sends strings for some fields) ──────────
    mutate {
      convert => {
        "file_size"  => "integer"
        "entropy"    => "float"
        "blocked"    => "boolean"
        "mime_match" => "boolean"
      }
    }

    # ── Step 3: Derive extension from filename if missing ────────────────────
    if ![extension] and [filename] {
      ruby {
        code => '
          fn  = event.get("filename").to_s
          ext = File.extname(fn).downcase.delete(".")
          event.set("extension", ext) unless ext.empty?
        '
      }
    }

    # ── Step 4: Temporal features ─────────────────────────────────────────────
    ruby {
      code => '
        ts = event.get("@timestamp")
        next unless ts
        t = ts.time
        event.set("hour_of_day", t.hour)
        event.set("day_of_week", t.wday == 0 ? 6 : t.wday - 1)
        event.set("is_off_hours", t.hour < 7 || t.hour >= 22)
      '
    }

    # ── Step 5: Clean up Logstash HTTP input metadata ─────────────────────────
    mutate {
      remove_field => ["headers", "host"]
    }

  }
}

output {
  if [type] == "nas-ai-events" {
    elasticsearch {
      hosts                        => ["https://172.16.32.32:9200"]
      user                         => "elastic"
      password                     => "${ES_PASSWORD}"
      ssl_certificate_verification => false
      index                        => "nas-ai-events-%{+YYYY.MM.dd}"
      template_name                => "nas-ai-events"
      template                     => "/usr/share/logstash/templates/nas-ai-events.json"
      template_overwrite           => false
    }
  }
}
