# Pipeline 1: Synology DSM syslog
#
# Input:  UDP/TCP 514 — configure in DSM > Log Center > Log Sending
# Output: Elasticsearch nas-syslog-YYYY.MM.dd
#
# Tested against DSM 7.x RFC 3164 format.
# Unparseable messages are tagged [_grokparsefailure] and still indexed
# so nothing is silently dropped.

input {
  udp {
    port  => 514
    type  => "nas-syslog"
    codec => "plain"
  }
  tcp {
    port  => 514
    type  => "nas-syslog"
    codec => "plain"
  }
}

filter {
  if [type] == "nas-syslog" {

    # ── Step 1: RFC 3164 syslog header ────────────────────────────────────────
    grok {
      match => {
        "message" => [
          # with priority: <13>May 27 10:30:15 hostname program[pid]: msg
          "<%{POSINT:syslog_pri}>%{SYSLOGTIMESTAMP:syslog_ts} %{SYSLOGHOST:nas_host} %{PROG:program}(?:\[%{POSINT}\])?: %{GREEDYDATA:body}",
          # without priority: May 27 10:30:15 hostname program: msg
          "%{SYSLOGTIMESTAMP:syslog_ts} %{SYSLOGHOST:nas_host} %{PROG:program}(?:\[%{POSINT}\])?: %{GREEDYDATA:body}"
        ]
      }
      tag_on_failure => ["_syslog_header_fail"]
    }

    date {
      match  => ["syslog_ts", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss", "MMM d HH:mm:ss"]
      target => "@timestamp"
    }

    # ── Step 2: Parse message body by program ─────────────────────────────────

    # synofsd — file system operations
    # Patterns:
    #   User [user] from [ip] renamed [/path/old] to [/path/new]
    #   User [user] from [ip] created file [/path]
    #   User [user] from [ip] deleted [/path]
    if [program] == "synofsd" {
      grok {
        match => {
          "body" => [
            "User \[%{DATA:nas_user}\] from \[%{IP:source_ip}\] (?<raw_op>renamed|moved) \[%{DATA:path}\] to \[%{DATA:new_path}\]",
            "User \[%{DATA:nas_user}\] from \[%{IP:source_ip}\] (?<raw_op>created file|uploaded file|create file|upload file|created|uploaded) \[%{DATA:path}\]",
            "User \[%{DATA:nas_user}\] from \[%{IP:source_ip}\] (?<raw_op>deleted|removed|delete file) \[%{DATA:path}\]",
            "User \[%{DATA:nas_user}\] from \[%{IP:source_ip}\] (?<raw_op>read|downloaded|accessed|read file|download file) \[%{DATA:path}\]",
            "User \[%{DATA:nas_user}\] from \[%{IP:source_ip}\] (?<raw_op>modified|written|wrote|modify file) \[%{DATA:path}\]"
          ]
        }
        tag_on_failure => ["_synofsd_parse_fail"]
      }
    }

    # synologyd — authentication events
    # Patterns:
    #   User [user] from [ip] logged in successfully via [SMB].
    #   User [user] from [ip] failed to log in via [SMB].
    else if [program] == "synologyd" {
      grok {
        match => {
          "body" => [
            "User \[%{DATA:nas_user}\] from \[%{IP:source_ip}\] (?<raw_op>logged in successfully) via \[%{DATA:auth_method}\]",
            "User \[%{DATA:nas_user}\] from \[%{IP:source_ip}\] (?<raw_op>failed to log in) via \[%{DATA:auth_method}\]"
          ]
        }
        tag_on_failure => ["_synologyd_parse_fail"]
      }
    }

    # samba / smbd — SMB file access (less structured, best-effort)
    else if [program] in ["smbd", "samba"] {
      grok {
        match => {
          "body" => [
            "%{IP:source_ip}.*\[%{DATA:nas_user}\].*(?<raw_op>opened|wrote|read|created|deleted|renamed) (?<path>[^ ]+)",
            "%{IP:source_ip}.*(?<raw_op>connect|disconnect)"
          ]
        }
        tag_on_failure => ["_samba_parse_fail"]
      }
    }

    # ── Step 3: Normalize operation via dictionary ─────────────────────────────
    if [raw_op] {
      mutate { lowercase => ["raw_op"] }

      translate {
        source      => "raw_op"
        target      => "operation"
        dictionary_path => "/etc/logstash/dict/operation.yml"
        fallback    => "unknown"
        refresh_interval => 300
      }
    }

    # ── Step 4: Extract filename, extension, share from path ──────────────────
    if [path] {
      ruby {
        code => '
          path = event.get("path").to_s.strip
          next if path.empty?

          filename = File.basename(path)
          event.set("filename", filename)

          ext = File.extname(filename).downcase.delete(".")
          event.set("extension", ext) unless ext.empty?

          # share = second segment of /volumeN/sharename/...
          parts = path.split("/").reject(&:empty?)
          event.set("share", parts[1]) if parts.length >= 2
        '
      }
    }

    # ── Step 5: Normalise nas_user and auth_method ────────────────────────────
    mutate {
      lowercase   => ["nas_user", "auth_method"]
      # strip trailing punctuation Synology sometimes adds
      gsub        => ["nas_user", "[.\s]+$", ""]
    }

    # ── Step 6: Temporal features ─────────────────────────────────────────────
    ruby {
      code => '
        ts = event.get("@timestamp")
        next unless ts
        t = ts.time
        event.set("hour_of_day", t.hour)
        # ISO day-of-week: 0=Mon … 6=Sun
        event.set("day_of_week", t.wday == 0 ? 6 : t.wday - 1)
        event.set("is_off_hours", t.hour < 7 || t.hour >= 22)
      '
    }

    # ── Step 7: Clean up intermediate fields ─────────────────────────────────
    mutate {
      remove_field => ["message", "syslog_pri", "syslog_ts", "body", "raw_op"]
    }

  }
}

output {
  if [type] == "nas-syslog" {
    elasticsearch {
      hosts                        => ["https://172.16.32.32:9200", "https://172.16.32.33:9200", "https://172.16.32.34:9200"]
      user                         => "elastic"
      password                     => "${ES_PASSWORD}"
      ssl_certificate_verification => false
      index                        => "nas-syslog-%{+YYYY.MM.dd}"
      template_name                => "nas-syslog"
      template                     => "/etc/logstash/templates/nas-syslog.json"
      template_overwrite           => false
    }
  }
}
