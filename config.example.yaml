# NAS AI — config.example.yaml
# Copy to config.yaml and fill in your values.

server:
  host: "0.0.0.0"
  port: 8900
  max_file_mb: 500

# Logstash HTTP input — sends analysis events to ES (nas-ai-events-*)
# Remove or leave empty to disable ES logging
logstash:
  url: "http://172.16.32.35:10544"

# File routing targets
# 'path' can be a local dir or a NAS mount point — no difference
# profile: strict | standard | fast | archive  (controls which pipeline stages run)
targets:
  home:
    path: "/mnt/nas-home/incoming"
    profile: "standard"
    allowed_types: ["*"]          # * = accept all passing files
  company:
    path: "/mnt/nas-company/uploads"
    profile: "strict"
    allowed_types: ["pdf", "docx", "xlsx", "pptx", "txt", "csv", "jpg", "png"]

# Quarantine path for suspicious/blocked files (kept for manual review)
quarantine_path: "/mnt/quarantine"

# ClamAV sidecar (Stage 5 — only runs for 'strict' profile)
# If clamd is unavailable, the scan is skipped (non-fatal) — upload still proceeds.
clamav:
  host: "clamav"    # Docker service name; use IP if running externally
  port: 3310
  timeout: 15       # seconds

security:
  # API key — when set, every /upload must send a matching `X-API-Key` header
  # (else HTTP 401). Leave as the placeholder / omit to disable auth.
  api_key: "YOUR_API_KEY"

  # Known-bad hash blocklist (Stage 0). One lowercase sha256 hex digest per line,
  # '#' for comments. Matched files are rejected instantly (verdict=malicious),
  # cheaper than ClamAV. Leave unset to disable.
  hash_blocklist_file: "/config/hash_blocklist.txt"

  # Archive / zip-bomb guard (Stage 7). Generous enough for legit zip/docx/xlsx,
  # but rejects classic decompression bombs. A hit is verdict=malicious.
  archive_max_ratio: 150              # uncompressed ÷ compressed
  archive_max_uncompressed_mb: 2048   # total uncompressed size cap
  archive_max_entries: 100000         # file-count cap (zip-of-many-files bomb)

# ML thresholds
ml:
  entropy_threshold: 7.2          # > this = suspicious (encrypted/packed)
  isolation_forest_contamination: 0.05   # expected anomaly ratio
  isolation_forest_min_samples: 30       # start scoring after N files seen
  isolation_forest_retrain_interval: 50  # refit once every N new clean samples
  malicious_score_threshold: -0.1        # IF score below this = anomaly

# Telegram notification
telegram:
  bot_token: "YOUR_BOT_TOKEN"
  chat_id: "YOUR_CHAT_ID"
  notify_on: ["suspicious", "malicious", "mime_mismatch"]  # or add "clean"
